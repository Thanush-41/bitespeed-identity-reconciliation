services:
  - type: web
    name: bitespeed-identity
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString

databases:
  - name: bitespeed-db
    plan: free
    databaseName: bitespeed
    user: bitespeed
